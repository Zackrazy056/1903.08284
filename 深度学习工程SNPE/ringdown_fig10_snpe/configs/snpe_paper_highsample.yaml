experiment_id: fig10_snpe_paper_highsample
use_fig10_spec_from: "configs/fig10.yaml"

snpe:
  backend: sbi
  train_separate_model_per_N: true
  N_list: [0, 1, 2, 3]
  target_parameters:
    - Mf_msun
    - chi_f
  nuisance_parameters:
    - amplitudes_A_n
    - phases_phi_n
  observation_representation: "whitened_fft_raw"
  posterior_num_samples: 120000
  features:
    n_fft: 16384
    n_freq_points: 1024
    fmin_hz: 154.68
    fmax_hz: 1024.0
  rounds:
    - id: 0
      n_simulations_per_N: 100000
      proposal: "prior"
    - id: 1
      n_simulations_per_N: 100000
      proposal: "posterior_truncated_99hpd"
    - id: 2
      n_simulations_per_N: 50000
      proposal: "posterior_truncated_narrower"
  simulator:
    amplitude_sampling: "uniform"
    snr_conditioning:
      enabled: true
      mode: "fixed"
      target: 42.3
      low: 36.0
      high: 48.0
      normal_sigma: 2.0
      min_signal_snr: 1.0e-9
      scale_min: 1.0e-3
      scale_max: 1.0e2
  proposal_truncation:
    enabled: true
    quantile_low: 0.005
    quantile_high: 0.995
    proposal_probe_samples: 30000
    draw_batch_size: 8192
    max_batches: 1000
  estimator:
    type: "nsf"
    hidden_features: 256
    num_transforms: 8
    z_score_x: "independent"
    z_score_theta: "independent"
    embedding:
      type: "resnet1d"
      out_features: 128
      base_channels: 32
      kernel_size: 7
  optimizer:
    learning_rate: 0.001
    batch_size: 128
    max_epochs: 260
    early_stopping_patience: 30
  sanity_gate:
    enabled: true
    x_global_std_min: 1.0e-12
    theta_mf_std_min: 1.0e-3
    theta_chi_std_min: 1.0e-4
    x_standardized_mean_abs_max: 0.2
    x_standardized_std_min: 0.8
    x_standardized_std_max: 1.2
  runtime:
    device: "cuda"
    simulation_data_device: "cpu"
    allow_fallback_cpu: true

outputs:
  figure: "outputs/fig10_snpe.png"
  checkpoints_dir: "outputs/checkpoints"
  posterior_samples_dir: "outputs/posteriors"
